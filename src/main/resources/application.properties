# Common Properties
spring.application.name=Bootcamp4U
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Set the default active profile to 'dev' (you can change this later)
spring.profiles.active=dev
spring.profiles.include=secrets

app.security.authPath=/api/v1/auth
app.bootcamps.path=/api/v1/bootcamps

logging.level.com.bootcamp4u=DEBUG