# MySQL Database (Production DB)
spring.datasource.url=jdbc:mysql://prod-db.example.com:3306/bootapplication?useSSL=true
spring.datasource.username=prod_db_user
# Use environment variables for sensitive data instead of hardcoding
spring.datasource.password=${PROD_DB_PASSWORD}

# JPA/Hibernate (Strict and Performant)
# 'validate' ensures your entities match the DB, but won't alter the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (Production)
jwt.secret=${PROD_JWT_SECRET}
jwt.expiration=3600000

# Allowed domain (Live Domain)
app.cors.allowed-origins=https://www.bootcamp4u.com